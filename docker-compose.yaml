services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mailfeed-postgres-v2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mailfeed
    ports:
      - "5432:5432"
    volumes:
      - mailfeed_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mailfeed"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mailfeed_pgdata:
